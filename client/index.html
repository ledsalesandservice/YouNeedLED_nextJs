<!doctype html>
<!-- build-id: 1774204165 -->
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />

    <!-- Critical above-the-fold CSS — inlined to eliminate render-blocking stylesheet request -->
    <style>
      /* Box model reset */
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; width: 100%; max-width: 100%; overflow-x: hidden; }
      img, video, iframe { max-width: 100%; height: auto; }
      @media (max-width: 768px) { body { font-size: 16px; } }
      @media (max-width: 480px) { body { font-size: 15px; } }

      /* Self-hosted font faces — eliminates external Google Fonts render-blocking request */
      @font-face {
        font-family: 'Plus Jakarta Sans';
        font-style: normal;
        font-weight: 400 800;
        font-display: swap;
        src: url('/fonts/plus-jakarta-sans-400-normal.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400 600;
        font-display: swap;
        src: url('/fonts/inter-400-normal.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      /* Critical nav + hero skeleton — prevents layout shift during font load */
      body { font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; background: #fff; }
      #root { min-height: 100vh; }
    </style>

    <title>Security Cameras & VoIP South Jersey | You Need L.E.D.</title>
    <meta name="description" content="Professional security camera installation, VoIP phone systems, access control, and fire alarm systems in South Jersey. NJ DCA Licensed. Call (609) 335-0123." />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#0e319a" />

    <!-- Preload hero image for faster LCP — fetchpriority tells browser to load this first -->
    <link rel="preload" as="image" href="/hero-main-800w.webp" type="image/webp"
      imagesrcset="/hero-main-400w.webp 400w, /hero-main-800w.webp 800w, /hero-main-1200w.webp 1200w, /hero-main-1920w.webp 1920w"
      imagesizes="100vw"
      fetchpriority="high"
    />

    <!-- Preload the two self-hosted font files used above the fold -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/plus-jakarta-sans-400-normal.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-400-normal.woff2" crossorigin />

    <!-- Google Tag Manager — deferred to avoid blocking initial render -->
    <!-- GTM loads after page is interactive to prevent 161ms main-thread block -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
          new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
          j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
          'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
          })(window,document,'script','dataLayer','GTM-EDHKYQ24V7');
        }, 2000);
      });
    </script>

  </head>

  <body>
    <!-- Google Tag Manager (noscript fallback) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-EDHKYQ24V7"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
